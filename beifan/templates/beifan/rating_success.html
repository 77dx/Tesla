<!DOCTYPE html>
<html>
<head>

<script>
  const { createApp } = Vue;
	const app = createApp({
      data() {
        return {
          formJson: {"widgetList":[{"key":16101,"type":"picture-upload","icon":"picture-upload-field","formItemFlag":true,"options":{"name":"pictureupload89851","label":"","labelAlign":"label-left-align","labelWidth":null,"labelHidden":false,"columnWidth":"200px","disabled":false,"hidden":false,"required":false,"requiredHint":"","customRule":"","customRuleHint":"","uploadURL":"","uploadTip":"","withCredentials":false,"multipleSelect":false,"showFileList":true,"limit":3,"fileMaxSize":5,"fileTypes":["jpg","jpeg","png"],"customClass":[],"labelIconClass":null,"labelIconPosition":"rear","labelTooltip":null,"onCreated":"","onMounted":"","onBeforeUpload":"","onUploadSuccess":"","onUploadError":"","onFileRemove":"","onValidate":""},"id":"pictureupload89851"},{"key":109022,"type":"static-text","icon":"static-text","formItemFlag":false,"options":{"name":"statictext85165","columnWidth":"200px","hidden":false,"textContent":"提交成功","textAlign":"center","fontSize":"30px","preWrap":false,"customClass":"","onCreated":"","onMounted":"","label":"static-text"},"id":"statictext85165"}],"formConfig":{"modelName":"formData","refName":"vForm","rulesName":"rules","labelWidth":80,"labelPosition":"left","size":"","labelAlign":"label-left-align","cssCode":"","customClass":[],"functions":"","layoutType":"PC","jsonVersion":3,"onFormCreated":"","onFormMounted":"","onFormDataChange":""}},
          formData: {},

</script>
</body>
</html>
