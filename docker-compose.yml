version: '3.8'

services:
  # ─── Redis ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: tesla_redis
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - tesla_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Django 后端 ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tesla_backend
    restart: always
    environment:
      - DJANGO_SETTINGS_MODULE=Tesla.settings.development
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - ./backend/media:/app/media
      - ./backend/data:/app/data
      - ./backend/logs:/app/logs
      - ./backend/upload_yaml:/app/upload_yaml
      - static_files:/app/staticfiles
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - tesla_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/schema/", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ─── Celery Worker ───────────────────────────────────────
  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tesla_celery
    restart: always
    command: celery -A Tesla worker -l info --concurrency=4
    environment:
      - DJANGO_SETTINGS_MODULE=Tesla.settings.development
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - ./backend/media:/app/media
      - ./backend/upload_yaml:/app/upload_yaml
      - ./backend/logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - tesla_network

  # ─── Nginx + 前端 ─────────────────────────────────────────
  frontend:
    image: nginx:alpine
    container_name: tesla_frontend
    restart: always
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - static_files:/app/staticfiles:ro
      - ./backend/media:/app/media:ro
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_started
    networks:
      - tesla_network

volumes:
  redis_data:
  static_files:

networks:
  tesla_network:
    driver: bridge
